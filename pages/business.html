<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Operations | Two Marshalls Studios</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header id="studio-header" data-page-title="Business Operations" data-page-subtitle="Planning, finance, scheduling, studio management, and operational decision making."></header>

<nav id="studio-nav"></nav>

<main class="dashboard">
  <section class="dashboard-card full-width">
    <div class="card-header">
      <span class="card-icon">🏢</span>
      <div>
        <p class="section-label">Studio Management</p>
        <h2>Business Operations Dashboard</h2>
      </div>
    </div>
    <p>Planning, finance, scheduling, studio management, and operational decision making.</p>
  </section>

  <section class="dashboard-card projects-card">
    <div class="card-header">
      <span class="card-icon">🎮</span>
      <div>
        <p class="section-label">Active Work</p>
        <h2>Business Projects</h2>
      </div>
    </div>
    <div class="project-list" id="business-project-list"></div>
  </section>

  <section class="dashboard-card status-card">
    <div class="card-header">
      <span class="card-icon">📊</span>
      <div>
        <p class="section-label">System Health</p>
        <h2>Business Status</h2>
      </div>
    </div>
    <div class="status-list" id="business-status-list"></div>
  </section>
</main>

<footer id="studio-footer"></footer>

<script src="../js/studio-data/core.js"></script>
<script src="../js/studio-data/documentation.js"></script>
<script src="../js/studio-data/departments.js"></script>
<script src="../js/studio-data/database.js"></script>
<script src="../js/studio-data/records/projects.js"></script>
<script src="js/studio-data/records/workSessions.js"></script>
<script src="../js/studio-data/loader.js"></script>
<script src="../js/studio-data/knowledge.js"></script>
<script src="../js/studio-data/migration.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/search.js"></script>
<script src="../js/business.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
