<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing | Two Marshalls Studios</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header id="studio-header" data-page-title="Marketing" data-page-subtitle="Screenshots, trailers, campaigns, and brand assets."></header>

<nav id="studio-nav"></nav>

<main class="dashboard">
  <section class="dashboard-card full-width">
    <div class="card-header">
      <span class="card-icon">📣</span>
      <div>
        <p class="section-label">Marketing</p>
        <h2>Marketing Channels</h2>
      </div>
    </div>
    <p>Screenshots, trailers, campaigns, and brand assets.</p>
  </section>

  <section class="dashboard-card projects-card">
    <div class="card-header">
      <span class="card-icon">📡</span>
      <div>
        <p class="section-label">Channels</p>
        <h2>Marketing Channel List</h2>
      </div>
    </div>
    <div class="project-list" id="marketing-channel-list"></div>
  </section>

  <section class="dashboard-card full-width">
    <div class="card-header">
      <span class="card-icon">🎬</span>
      <div>
        <p class="section-label">Marketing Workflow</p>
        <h2>Marketing Pipeline</h2>
      </div>
    </div>
    <div class="area-grid" id="marketing-pipeline-list"></div>
  </section>
</main>

<footer id="studio-footer"></footer>

<script src="../js/studio-data/core.js"></script>
<script src="../js/studio-data/documentation.js"></script>
<script src="../js/studio-data/departments.js"></script>
<script src="../js/studio-data/loader.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/search.js"></script>
<script src="../js/marketing.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
